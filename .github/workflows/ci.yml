name: Fortress CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run Tests
        run: |
          cd backend
          npm test --if-present

      - name: Lint Code
        run: |
          cd backend
          npm run lint --if-present

      - name: Verify Project
        run: |
          cd backend
          node -e "console.log('Fortress CI passed successfully')"
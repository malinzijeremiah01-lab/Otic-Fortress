name: Fortress CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACKEND

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
          else
            echo "No package.json found in BACKEND; skipping dependency install."
          fi

      - name: Run Tests
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found in BACKEND; skipping tests."
          elif node -e "const pkg=require('./package.json'); const test=pkg.scripts && pkg.scripts.test; process.exit(test && !test.includes('no test specified') ? 0 : 1)"; then
            npm test
          else
            echo "No test script available; skipping tests."
          fi

      - name: Lint Code
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found in BACKEND; skipping lint."
          elif node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script available; skipping lint."
          fi

      - name: Verify Project
        run: |
          echo "Fortress CI passed successfully."
